<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="768" viewBox="0 0 1420 768" role="img" aria-labelledby="title desc">
  <title id="title">Owen AI 문서 제작 병합 모델</title>
  <desc id="desc">Owen Graphite, Merged AI Workflow, Owen Editor가 함께 동작하는 문서 제작 흐름을 보여주는 다이어그램.</desc>
  <defs>
    <linearGradient id="header-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#effbf4"/>
    </linearGradient>
    <linearGradient id="workflow-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e9"/>
      <stop offset="1" stop-color="#fffaf1"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#25334a" flood-opacity="0.14"/>
    </filter>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#1b2638" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101827; letter-spacing: 0; }
      .headline { font-size: 34px; font-weight: 850; }
      .subtitle { font-size: 18px; font-weight: 600; fill: #3f4857; }
      .card-title { font-size: 27px; font-weight: 850; }
      .workflow-title { font-size: 27px; font-weight: 850; fill: #762a1a; }
      .layer { font-size: 16px; font-weight: 600; fill: #3f4857; }
      .section-title { font-size: 17px; font-weight: 850; }
      .bullet { font-size: 16px; font-weight: 500; fill: #293241; }
      .step-text { font-size: 17px; font-weight: 850; }
      .footer { font-size: 18px; font-weight: 600; fill: #263241; }
    </style>
  </defs>

  <rect width="1420" height="768" fill="#f8fafc"/>

  <rect x="51" y="30" width="1328" height="114" rx="20" fill="url(#header-bg)" stroke="#c9d5e4"/>
  <text x="710" y="78" class="headline" text-anchor="middle">Owen AI 문서 제작 병합 모델</text>
  <text x="710" y="116" class="subtitle" text-anchor="middle">Graphite는 문서 설계 원칙, Editor는 실행 가능한 삽입 문법을 담당한다.</text>

  <g filter="url(#soft-shadow)">
    <rect x="74" y="228" width="375" height="351" rx="18" fill="#ffffff" stroke="#315f99" stroke-width="1.3"/>
    <text x="262" y="275" class="card-title" text-anchor="middle" fill="#183785">Owen Graphite</text>
    <text x="262" y="310" class="layer" text-anchor="middle">Design System Layer</text>
    <line x1="118" y1="340" x2="405" y2="340" stroke="#e4ecf3" stroke-width="3"/>
    <text x="121" y="381" class="section-title">정의하는 것</text>
    <text x="121" y="416" class="bullet">• 문서 구조와 정보 계층</text>
    <text x="121" y="448" class="bullet">• 보고서/PDF 출력 안정성</text>
    <text x="121" y="480" class="bullet">• Callout 의미 체계</text>
    <text x="121" y="512" class="bullet">• Table utility class</text>
  </g>

  <g filter="url(#card-shadow)">
    <rect x="516" y="197" width="395" height="412" rx="24" fill="url(#workflow-bg)" stroke="#df8a52" stroke-width="1.3"/>
    <text x="714" y="246" class="workflow-title" text-anchor="middle">Merged AI Workflow</text>
    <text x="714" y="282" class="layer" text-anchor="middle" fill="#63331f">LLM-wiki 문서 생성 기본값</text>

    <rect x="566" y="325" width="299" height="52" rx="10" fill="#ffffff" stroke="#eadbbd"/>
    <text x="716" y="358" class="step-text" text-anchor="middle">1. 목적과 독자 정의</text>

    <rect x="566" y="395" width="299" height="52" rx="10" fill="#ffffff" stroke="#eadbbd"/>
    <text x="716" y="428" class="step-text" text-anchor="middle">2. Graphite 구조 선택</text>

    <rect x="566" y="465" width="299" height="52" rx="10" fill="#ffffff" stroke="#eadbbd"/>
    <text x="716" y="498" class="step-text" text-anchor="middle">3. Editor 문법 적용</text>

    <rect x="566" y="535" width="299" height="52" rx="10" fill="#ffffff" stroke="#eadbbd"/>
    <text x="716" y="568" class="step-text" text-anchor="middle">4. 출력 품질 검증</text>
  </g>

  <path d="M449 403 L512 403" fill="none" stroke="#405270" stroke-width="4"/>
  <path d="M512 403 L479 385 L479 421 Z" fill="#405270"/>
  <path d="M981 403 L918 403" fill="none" stroke="#405270" stroke-width="4"/>
  <path d="M918 403 L951 385 L951 421 Z" fill="#405270"/>

  <g filter="url(#soft-shadow)">
    <rect x="981" y="228" width="375" height="351" rx="18" fill="#ffffff" stroke="#3aaf91" stroke-width="1.3"/>
    <text x="1169" y="275" class="card-title" text-anchor="middle" fill="#0b7a59">Owen Editor</text>
    <text x="1169" y="310" class="layer" text-anchor="middle">Implementation Layer</text>
    <line x1="1026" y1="340" x2="1312" y2="340" stroke="#e3f2ec" stroke-width="3"/>
    <text x="1029" y="381" class="section-title">구현하는 것</text>
    <text x="1029" y="416" class="bullet">• 버튼 결과 Markdown/HTML</text>
    <text x="1029" y="448" class="bullet">• Table Builder preset</text>
    <text x="1029" y="480" class="bullet">• Metric/status/reference snippet</text>
    <text x="1029" y="512" class="bullet">• Command ID와 변환 규칙</text>
  </g>

  <rect x="153" y="660" width="1123" height="68" rx="14" fill="#ffffff" stroke="#d3dbe4"/>
  <text x="714" y="701" class="footer" text-anchor="middle">최종 원칙: Markdown-first, purpose-specific classes, summary-first judgement, source-backed actions.</text>
</svg>